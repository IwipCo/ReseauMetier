<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Réseau Métier</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useMemo } = React;

/* ---------- Constantes & thème ---------- */
const TYPE = {
  lm:    { label: "Learning Moment", short: "LM",   btn: "bg-teal-700 hover:bg-teal-800",
           chip: "bg-teal-50 text-teal-800", chipDark: "bg-teal-950 text-teal-300" },
  talk:  { label: "ECC Talk",        short: "Talk", btn: "bg-orange-700 hover:bg-orange-800",
           chip: "bg-orange-50 text-orange-800", chipDark: "bg-orange-950 text-orange-300" },
  squad: { label: "Squad",           short: "Squad",btn: "bg-violet-700 hover:bg-violet-800",
           chip: "bg-violet-50 text-violet-800", chipDark: "bg-violet-950 text-violet-300" },
};
const CURRENT_USER = "Vous";
const TODAY = "2026-07-22";
const STORAGE_KEY = "reseau-metier-store-v1";
const emptyForm = { title: "", description: "", date: "", startTime: "10:00", duration: 60, organizers: "", tags: "" };
const emptySquadForm = { name: "", description: "", logo: "", pageLink: "", planning: "", tags: "", coreTeam: "", participants: "" };

function monthKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("fr-FR", { month: "long", year: "numeric" });
}
function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}
function isPast(dateStr) { return new Date(dateStr + "T00:00:00") < new Date(TODAY + "T00:00:00"); }
function pickFreeLink(events, links, date) {
  const used = new Set(events.filter(e => e.date === date).map(e => e.linkId));
  const free = links.find(l => !used.has(l.id));
  return free ? free.id : links[0].id;
}
function toTags(str) { return str.split(",").map(s => s.trim()).filter(Boolean); }

/* Copie de secours des données, utilisée si data.json ne peut pas être chargé
   (ex: fichier ouvert en double-clic, en file:// — le fetch est alors bloqué par le navigateur).
   Sur un vrai déploiement (serveur ou GitHub Pages), c'est data.json qui fait foi. */
const FALLBACK_SEED = {
  people: ["Vous", "Camille Durand", "Yanis Belkacem", "Sofia Rossi", "Marc Lefevre", "Aline Petit", "Karim Haddad", "Elise Moreau", "Thomas Nguyen", "Julie Bernard", "Hugo Simon"],
  visioLinks: Array.from({ length: 10 }, (_, i) => ({ id: i + 1, url: `https://teams.microsoft.com/l/meetup-join/lien-permanent-${i + 1}` })),
  events: [
    { id: "e1", type: "lm", status: "ferme", title: "Introduction au Design Thinking", description: "Un tour d'horizon des méthodes de co-création pour cadrer un besoin utilisateur en 2h.", date: "2026-06-05", startTime: "10:00", duration: 120, organizers: ["Camille Durand"], linkId: 1, tags: ["Méthodologie", "UX"], registrations: ["Vous", "Yanis Belkacem", "Sofia Rossi"] },
    { id: "e2", type: "lm", status: "ferme", title: "Bonnes pratiques Terraform", description: "Retour d'expérience sur la structuration de modules Terraform à grande échelle.", date: "2026-06-05", startTime: "10:30", duration: 90, organizers: ["Marc Lefevre", "Karim Haddad"], linkId: 2, tags: ["Cloud", "DevOps"], registrations: ["Aline Petit", "Thomas Nguyen"] },
    { id: "e3", type: "lm", status: "ouvert", title: "Écrire des user stories utiles", description: "Comment formuler des user stories qui aident vraiment l'équipe de dev.", date: "2026-06-19", startTime: "10:00", duration: 60, organizers: ["Elise Moreau"], linkId: 1, tags: ["Produit"], registrations: ["Vous", "Julie Bernard"] },
    { id: "e4", type: "lm", status: "ouvert", title: "Accessibilité web : les fondamentaux", description: "Les critères RGAA essentiels à connaître avant de livrer une interface.", date: "2026-07-03", startTime: "10:30", duration: 90, organizers: ["Hugo Simon"], linkId: 1, tags: ["UX", "Frontend"], registrations: ["Vous"] },
    { id: "e5", type: "talk", status: "ouvert", title: "ECC Talk — L'IA générative dans nos métiers", description: "Une plénière sur les usages concrets de l'IA générative observés cette année.", date: "2026-06-19", startTime: "11:00", duration: 60, organizers: ["Direction Innovation"], linkId: 3, tags: ["IA"], registrations: ["Vous", "Sofia Rossi", "Marc Lefevre", "Julie Bernard"] },
    { id: "e6", type: "talk", status: "ouvert", title: "ECC Talk — Sobriété numérique", description: "Comment réduire l'empreinte de nos systèmes d'information sans sacrifier la performance.", date: "2026-07-17", startTime: "10:00", duration: 60, organizers: ["Direction RSE"], linkId: 1, tags: ["RSE"], registrations: ["Aline Petit"] },
  ],
  squads: [
    { id: "s1", name: "Squad Accessibilité", logo: "A11Y", description: "Diffuser les bonnes pratiques d'accessibilité numérique dans tous les projets.", pageLink: "https://intranet.example.com/squads/a11y", planning: "1 réunion par mois, 1h", tags: ["UX", "Frontend"], coreTeam: ["Hugo Simon", "Elise Moreau"], participants: ["Vous", "Julie Bernard", "Karim Haddad"] },
    { id: "s2", name: "Squad Plateforme Data", logo: "DATA", description: "Mutualiser les outils et standards data entre les équipes produit.", pageLink: "https://intranet.example.com/squads/data", planning: "1 réunion toutes les 2 semaines, 45 min", tags: ["Data", "Cloud"], coreTeam: ["Marc Lefevre", "Thomas Nguyen", "Sofia Rossi"], participants: ["Aline Petit"] },
  ],
};

/* Petites icônes texte pour rester autonome (pas de dépendance externe) */
const Chevron = () => <span aria-hidden="true">›</span>;

function App() {
  const [loading, setLoading] = useState(true);
  const [usingFallback, setUsingFallback] = useState(false);
  const [githubConfig, setGithubConfig] = useState({ owner: "", repo: "", branch: "main", path: "data.json", token: "" });
  const [configForm, setConfigForm] = useState({ owner: "", repo: "", branch: "main", path: "data.json", token: "" });
  const [ghStatus, setGhStatus] = useState(null); // { type: 'loading'|'success'|'error', msg }
  const [people, setPeople] = useState([]);
  const [visioLinks, setVisioLinks] = useState([]);
  const [events, setEvents] = useState([]);
  const [squads, setSquads] = useState([]);

  const [isAdmin, setIsAdmin] = useState(false);
  const [darkMode, setDarkMode] = useState(false);
  const [tab, setTab] = useState("lm");
  const [viewMode, setViewMode] = useState("card");
  const [statusFilter, setStatusFilter] = useState("ouvert");
  const [tagFilter, setTagFilter] = useState(null);
  const [monthFilter, setMonthFilter] = useState("tous");
  const [showReal, setShowReal] = useState(false); // false = plafonné à 2 (par défaut), true = valeurs réelles
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [squadForm, setSquadForm] = useState(emptySquadForm);
  const [selectedPerson, setSelectedPerson] = useState(null);

  const GH_CONFIG_KEY = "reseau-metier-github-config";
  useEffect(() => {
    // Lien de configuration partagé : #config=<json encodé>, prioritaire sur le localStorage existant.
    if (window.location.hash.startsWith("#config=")) {
      try {
        const fromLink = JSON.parse(decodeURIComponent(window.location.hash.slice("#config=".length)));
        localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(fromLink));
        setGithubConfig(fromLink);
        setConfigForm(fromLink);
      } catch (err) {
        console.error("Lien de configuration invalide", err);
      }
      // On retire immédiatement le token de la barre d'adresse / de l'historique du navigateur.
      window.history.replaceState(null, "", window.location.pathname + window.location.search);
      return;
    }
    const saved = localStorage.getItem(GH_CONFIG_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      setGithubConfig(parsed);
      setConfigForm(parsed);
    }
  }, []);

  const shareLink = useMemo(() => {
    if (!configForm.owner || !configForm.repo || !configForm.token) return "";
    const encoded = encodeURIComponent(JSON.stringify(configForm));
    return `${window.location.origin}${window.location.pathname}#config=${encoded}`;
  }, [configForm]);

  function copyShareLink() {
    if (!shareLink) return;
    navigator.clipboard.writeText(shareLink);
    setGhStatus({ type: "success", msg: "Lien copié dans le presse-papiers." });
  }

  function saveGithubConfig(e) {
    e.preventDefault();
    localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(configForm));
    setGithubConfig(configForm);
    setModal(null);
    setGhStatus(null);
  }

  async function pushToGithub() {
    const { owner, repo, branch, path, token } = githubConfig;
    if (!owner || !repo || !token) {
      setGhStatus({ type: "error", msg: "Configuration GitHub incomplète (propriétaire, dépôt et token requis)." });
      return;
    }
    setGhStatus({ type: "loading", msg: "Publication en cours…" });
    try {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      let sha;
      const getRes = await fetch(`${apiUrl}?ref=${branch}`, {
        headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json" },
      });
      if (getRes.ok) {
        const getData = await getRes.json();
        sha = getData.sha;
      } else if (getRes.status !== 404) {
        const errData = await getRes.json().catch(() => ({}));
        throw new Error(errData.message || `Lecture du fichier impossible (HTTP ${getRes.status})`);
      }
      const payload = { people, visioLinks, events, squads };
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
      const putRes = await fetch(apiUrl, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json" },
        body: JSON.stringify({
          message: `Mise à jour des données Réseau Métier — ${new Date().toISOString()}`,
          content, sha, branch,
        }),
      });
      if (!putRes.ok) {
        const errData = await putRes.json().catch(() => ({}));
        throw new Error(errData.message || `Échec de la publication (HTTP ${putRes.status})`);
      }
      setGhStatus({ type: "success", msg: "Données publiées sur GitHub. La page se mettra à jour pour tout le monde après le redéploiement de Pages (quelques secondes à ~1 min)." });
    } catch (err) {
      setGhStatus({ type: "error", msg: "Échec : " + err.message });
    }
  }

  /* ---------- Chargement des données : localStorage (édité) sinon data.json (source) ---------- */
  useEffect(() => {
    async function load() {
      const saved = localStorage.getItem(STORAGE_KEY);
      let seed = FALLBACK_SEED;
      let usedFallback = true;
      try {
        const res = await fetch("./data.json");
        if (!res.ok) throw new Error("HTTP " + res.status);
        seed = await res.json();
        usedFallback = false;
      } catch (err) {
        console.warn("data.json non chargé (normal si ouvert en file://) — utilisation des données de secours embarquées.", err);
      }
      setPeople(seed.people);
      setVisioLinks(seed.visioLinks);
      if (saved) {
        const parsed = JSON.parse(saved);
        setEvents(parsed.events || seed.events);
        setSquads(parsed.squads || seed.squads);
      } else {
        setEvents(seed.events);
        setSquads(seed.squads);
      }
      setUsingFallback(usedFallback);
      setLoading(false);
    }
    load();
  }, []);

  /* Persistance locale des modifications (navigateur courant uniquement, voir note de déploiement) */
  useEffect(() => {
    if (loading) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ events, squads }));
  }, [events, squads, loading]);

  const t = darkMode ? {
    page: "bg-slate-950 text-slate-100", panel: "bg-slate-900 border-slate-800", border: "border-slate-800",
    subtext: "text-slate-400", faint: "text-slate-500", input: "bg-slate-950 border-slate-700 text-slate-100 placeholder-slate-500",
    tableHead: "bg-slate-900 text-slate-400", rowBorder: "border-slate-800", chipNeutral: "bg-slate-800 text-slate-300",
    tabInactive: "text-slate-500 hover:text-slate-200", tabActive: "border-slate-100 text-slate-100",
    warn: "text-amber-300 bg-amber-950 border-amber-900", over: "text-red-300 bg-red-950",
    toggleBtn: "bg-slate-100 text-slate-900 border-slate-100", toggleBtnOff: "bg-slate-900 text-slate-300 border-slate-700",
    modalOverlay: "bg-black/60", tagPill: "bg-slate-800 text-slate-300 border-slate-700", tagPillActive: "bg-slate-100 text-slate-900 border-slate-100",
  } : {
    page: "bg-white text-slate-800", panel: "bg-white border-slate-200", border: "border-slate-200",
    subtext: "text-slate-500", faint: "text-slate-400", input: "bg-white border-slate-300 text-slate-800 placeholder-slate-400",
    tableHead: "bg-slate-50 text-slate-500", rowBorder: "border-slate-100", chipNeutral: "bg-slate-100 text-slate-600",
    tabInactive: "text-slate-500 hover:text-slate-700", tabActive: "border-slate-900 text-slate-900",
    warn: "text-amber-800 bg-amber-50 border-amber-200", over: "text-red-700 bg-red-50",
    toggleBtn: "bg-slate-900 text-white border-slate-900", toggleBtnOff: "bg-white text-slate-600 border-slate-300",
    modalOverlay: "bg-black/45", tagPill: "bg-slate-100 text-slate-600 border-slate-200", tagPillActive: "bg-slate-900 text-white border-slate-900",
  };

  const tabs = [
    { id: "lm", label: "Learning Moments" },
    { id: "talk", label: "ECC Talks" },
    { id: "squad", label: "Squads" },
    ...(isAdmin ? [{ id: "synthese", label: "Synthèse admin" }] : []),
  ];

  function toggleRegister(eventId) {
    setEvents(evts => evts.map(e => {
      if (e.id !== eventId) return e;
      const already = e.registrations.includes(CURRENT_USER);
      return { ...e, registrations: already ? e.registrations.filter(p => p !== CURRENT_USER) : [...e.registrations, CURRENT_USER] };
    }));
  }
  function closeEvent(id) { setEvents(evts => evts.map(e => e.id === id ? { ...e, status: "ferme" } : e)); }
  function reopenEvent(id) { setEvents(evts => evts.map(e => e.id === id ? { ...e, status: "ouvert" } : e)); }
  function openCreate(type) { setForm(emptyForm); setModal(type); }

  function submitEvent(e) {
    e.preventDefault();
    if (!form.title || !form.date) return;
    const linkId = pickFreeLink(events, visioLinks, form.date);
    const newEvent = {
      id: `e${Date.now()}`, type: modal, status: "ouvert",
      title: form.title, description: form.description, date: form.date,
      startTime: form.startTime || "10:00", duration: Number(form.duration) || 60,
      organizers: toTags(form.organizers), linkId, tags: toTags(form.tags), registrations: [],
    };
    setEvents(evts => [...evts, newEvent]);
    setModal(null);
  }

  function submitSquad(e) {
    e.preventDefault();
    if (!squadForm.name) return;
    const newSquad = {
      id: `s${Date.now()}`, name: squadForm.name,
      logo: (squadForm.logo || squadForm.name.slice(0, 4)).toUpperCase(),
      description: squadForm.description, pageLink: squadForm.pageLink, planning: squadForm.planning,
      tags: toTags(squadForm.tags), coreTeam: toTags(squadForm.coreTeam), participants: toTags(squadForm.participants),
    };
    setSquads(sq => [...sq, newSquad]);
    setModal(null);
    setSquadForm(emptySquadForm);
  }

  function joinSquad(squadId, group) {
    setSquads(sqs => sqs.map(s => {
      if (s.id !== squadId) return s;
      if (s.coreTeam.includes(CURRENT_USER) || s.participants.includes(CURRENT_USER)) return s;
      return group === "core" ? { ...s, coreTeam: [...s.coreTeam, CURRENT_USER] } : { ...s, participants: [...s.participants, CURRENT_USER] };
    }));
  }

  const synthesis = useMemo(() => {
    const rows = {};
    people.forEach(p => { rows[p] = {}; });
    events.forEach(e => {
      const mk = monthKey(e.date);
      e.registrations.forEach(p => { if (!rows[p]) rows[p] = {}; rows[p][mk] = (rows[p][mk] || 0) + 1; });
    });
    const currentMonth = monthKey(TODAY);
    squads.forEach(s => {
      [...s.coreTeam, ...s.participants].forEach(p => { if (!rows[p]) rows[p] = {}; rows[p][currentMonth] = (rows[p][currentMonth] || 0) + 1; });
    });
    const months = Array.from(new Set(events.map(e => monthKey(e.date)).concat([currentMonth])))
      .sort((a, b) => new Date("1 " + a) - new Date("1 " + b));
    return { rows, months };
  }, [events, squads, people]);

  function personDetail(person) {
    const myEvents = events.filter(e => e.registrations.includes(person)).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
    const mySquads = squads.filter(s => s.coreTeam.includes(person) || s.participants.includes(person))
      .map(s => ({ ...s, role: s.coreTeam.includes(person) ? "Core team" : "Participant" }));
    const byMonth = {};
    myEvents.forEach(e => {
      const mk = monthKey(e.date);
      if (!byMonth[mk]) byMonth[mk] = [];
      byMonth[mk].push(e);
    });
    const eventsByMonth = Object.entries(byMonth).sort((a, b) => new Date("1 " + a[0]) - new Date("1 " + b[0]));
    return { myEvents, mySquads, eventsByMonth };
  }

  function exportCSV() {
    const lines = [["personne", "mois", "type", "titre", "statut"].join(";")];
    events.forEach(e => e.registrations.forEach(p => lines.push([p, monthKey(e.date), TYPE[e.type].label, e.title, e.status].join(";"))));
    squads.forEach(s => [...s.coreTeam, ...s.participants].forEach(p => lines.push([p, monthKey(TODAY), "Squad", s.name, "actif"].join(";"))));
    downloadFile("export_participation.csv", lines.join("\n"), "text/csv");
  }
  function exportJSON() {
    const data = { people, visioLinks, events, squads };
    downloadFile("data.json", JSON.stringify(data, null, 2), "application/json");
  }
  function resetFromSeed() {
    localStorage.removeItem(STORAGE_KEY);
    window.location.reload();
  }
  function downloadFile(name, content, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
  }

  if (loading) {
    return <div className="p-10 text-center text-slate-400">Chargement des données…</div>;
  }

  const allTags = Array.from(new Set(
    (tab === "squad" ? squads : events.filter(e => e.type === tab)).flatMap(x => x.tags || [])
  ));
  const visibleEvents = events.filter(e =>
    e.type === tab &&
    (statusFilter === "tous" || e.status === statusFilter) &&
    (!tagFilter || (e.tags || []).includes(tagFilter))
  ).sort((a, b) => new Date(a.date + "T" + a.startTime) - new Date(b.date + "T" + b.startTime));
  const visibleSquads = squads.filter(s => !tagFilter || (s.tags || []).includes(tagFilter));
  const detail = selectedPerson ? personDetail(selectedPerson) : null;
  const monthsToShow = monthFilter === "tous" ? synthesis.months : [monthFilter];

  return (
    <div className={`min-h-screen ${t.page}`}>
      <div className="max-w-5xl mx-auto p-5">
        {/* ---------- Header ---------- */}
        <div className={`flex flex-wrap items-center justify-between gap-3 pb-5 border-b ${t.border}`}>
          <div className="flex items-center gap-3">
            <svg width="34" height="34" viewBox="0 0 34 34">
              <circle cx="8" cy="26" r="4" fill="#0f6e56" />
              <circle cx="26" cy="26" r="4" fill="#993c1d" />
              <circle cx="17" cy="7" r="4" fill="#534ab7" />
              <line x1="8" y1="26" x2="17" y2="7" stroke={darkMode ? "#57564f" : "#b4b2a9"} strokeWidth="1.5" />
              <line x1="26" y1="26" x2="17" y2="7" stroke={darkMode ? "#57564f" : "#b4b2a9"} strokeWidth="1.5" />
              <line x1="8" y1="26" x2="26" y2="26" stroke={darkMode ? "#57564f" : "#b4b2a9"} strokeWidth="1.5" />
            </svg>
            <div>
              <div className="text-xl font-semibold tracking-tight">Réseau Métier</div>
              <div className={`text-xs ${t.faint}`}>Learning Moments · ECC Talks · Squads</div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setDarkMode(d => !d)} aria-label="Basculer le mode sombre"
              className={`w-8 h-8 rounded-full border text-sm ${t.toggleBtnOff}`}>{darkMode ? "☀" : "☾"}</button>
            <button onClick={() => setIsAdmin(a => !a)}
              className={`text-sm px-3 py-1.5 rounded-full border ${isAdmin ? t.toggleBtn : t.toggleBtnOff}`}>
              {isAdmin ? "Vue admin activée" : "Activer la vue admin"}
            </button>
            {isAdmin && (
              <button onClick={() => { setConfigForm(githubConfig); setModal("config"); }}
                className={`text-sm px-3 py-1.5 rounded-full border ${t.toggleBtnOff}`}>
                ⚙ Configuration
              </button>
            )}
          </div>
        </div>

        {usingFallback && (
          <div className={`mt-4 text-xs rounded-lg px-3 py-2 border ${t.warn}`}>
            data.json n'a pas pu être chargé (probablement parce que la page est ouverte en double-clic, sans serveur) — l'app utilise une copie de données embarquée à la place. Sur GitHub Pages, ce message n'apparaîtra pas.
          </div>
        )}

        {/* ---------- Tabs ---------- */}
        <div className={`flex gap-1 mt-5 border-b overflow-x-auto ${t.border}`}>
          {tabs.map(tb => (
            <button key={tb.id} onClick={() => { setTab(tb.id); setSelectedPerson(null); setTagFilter(null); }}
              className={`px-4 py-2 text-sm font-medium border-b-2 -mb-px whitespace-nowrap ${tab === tb.id ? t.tabActive : `border-transparent ${t.tabInactive}`}`}>
              {tb.label}
            </button>
          ))}
        </div>

        {/* ---------- LM / Talk ---------- */}
        {(tab === "lm" || tab === "talk") && (
          <div className="mt-5">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
              <div className={`text-sm ${t.subtext}`}>{visibleEvents.length} élément(s) affiché(s)</div>
              <div className="flex flex-wrap items-center gap-2">
                <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className={`text-sm border rounded-lg px-2 py-1.5 ${t.input}`}>
                  <option value="ouvert">Ouverts</option>
                  <option value="ferme">Historique (fermés)</option>
                  <option value="tous">Tous</option>
                </select>
                <div className={`flex rounded-lg border overflow-hidden ${t.border}`}>
                  <button onClick={() => setViewMode("card")} className={`px-2 py-1.5 text-xs ${viewMode === "card" ? t.toggleBtn : t.panel}`}>Cartes</button>
                  <button onClick={() => setViewMode("list")} className={`px-2 py-1.5 text-xs ${viewMode === "list" ? t.toggleBtn : t.panel}`}>Liste</button>
                </div>
                {(tab === "lm" || isAdmin) && (
                  <button onClick={() => openCreate(tab)} className={`text-sm text-white px-3 py-1.5 rounded-lg ${TYPE[tab].btn}`}>
                    + Créer {tab === "lm" ? "un Learning Moment" : "un Talk"}
                  </button>
                )}
              </div>
            </div>

            {allTags.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mb-4">
                {allTags.map(tg => (
                  <button key={tg} onClick={() => setTagFilter(f => f === tg ? null : tg)}
                    className={`text-xs px-2 py-0.5 rounded-full border ${tagFilter === tg ? t.tagPillActive : t.tagPill}`}>
                    #{tg}
                  </button>
                ))}
              </div>
            )}

            {tab === "talk" && !isAdmin && (
              <div className={`mb-4 text-xs rounded-lg px-3 py-2 border ${t.warn}`}>Seuls les admins peuvent créer un ECC Talk. Activez la vue admin pour tester.</div>
            )}

            <div className={viewMode === "card" ? "grid grid-cols-1 md:grid-cols-2 gap-4" : "flex flex-col gap-3"}>
              {visibleEvents.map(ev => {
                const registered = ev.registrations.includes(CURRENT_USER);
                const link = visioLinks.find(l => l.id === ev.linkId);
                const closed = ev.status === "ferme";
                return (
                  <div key={ev.id} className={`border rounded-xl p-4 ${t.panel} ${closed ? "opacity-70" : ""}`}>
                    <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                      <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${darkMode ? TYPE[ev.type].chipDark : TYPE[ev.type].chip}`}>{TYPE[ev.type].short}</span>
                      {closed && <span className={`text-xs px-2 py-0.5 rounded-full ${t.chipNeutral}`}>Historique</span>}
                      <span className={`text-xs ${t.faint}`}>{formatDate(ev.date)}</span>
                      <span className={`text-xs ${t.faint}`}>· {ev.startTime} · {ev.duration} min</span>
                    </div>
                    <div className="font-medium">{ev.title}</div>
                    <div className={`text-sm mt-1 ${t.subtext}`}>{ev.description}</div>
                    <div className={`text-xs mt-2 ${t.faint}`}>Organisé par {ev.organizers.join(", ")}</div>
                    <div className={`text-xs mt-1 ${t.faint}`}>Lien Teams n°{link ? link.id : "?"} — envoyé automatiquement la veille aux inscrits</div>
                    {(ev.tags || []).length > 0 && (
                      <div className="flex flex-wrap gap-1 mt-2">
                        {ev.tags.map(tg => <span key={tg} className={`text-xs px-2 py-0.5 rounded-full border ${t.tagPill}`}>#{tg}</span>)}
                      </div>
                    )}
                    <div className={`text-xs mt-2 ${t.subtext}`}>
                      Inscrits ({ev.registrations.length}) : {ev.registrations.length ? ev.registrations.join(", ") : "aucun pour l'instant"}
                    </div>
                    <div className="flex items-center gap-2 mt-3 flex-wrap">
                      {!closed && (
                        <button onClick={() => toggleRegister(ev.id)}
                          className={`text-xs font-medium px-3 py-1.5 rounded-lg border ${registered ? `${t.chipNeutral} border-transparent` : `text-white border-transparent ${TYPE[ev.type].btn}`}`}>
                          {registered ? "Se désinscrire" : "S'inscrire"}
                        </button>
                      )}
                      {isAdmin && !closed && isPast(ev.date) && (
                        <button onClick={() => closeEvent(ev.id)} className={`text-xs px-3 py-1.5 rounded-lg border ${t.border}`}>Clôturer</button>
                      )}
                      {isAdmin && closed && (
                        <button onClick={() => reopenEvent(ev.id)} className={`text-xs px-3 py-1.5 rounded-lg border ${t.border}`}>Ré-ouvrir</button>
                      )}
                    </div>
                  </div>
                );
              })}
              {visibleEvents.length === 0 && <div className={`text-sm ${t.faint} border rounded-xl p-6 text-center ${t.border}`}>Aucun élément pour ce filtre.</div>}
            </div>
          </div>
        )}

        {/* ---------- Squads ---------- */}
        {tab === "squad" && (
          <div className="mt-5">
            <div className="flex items-center justify-between mb-3">
              <div className={`text-sm ${t.subtext}`}>{visibleSquads.length} squad(s)</div>
              {isAdmin && (
                <button onClick={() => { setSquadForm(emptySquadForm); setModal("squad"); }} className={`text-sm text-white px-3 py-1.5 rounded-lg ${TYPE.squad.btn}`}>+ Créer une squad</button>
              )}
            </div>
            {allTags.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mb-4">
                {allTags.map(tg => (
                  <button key={tg} onClick={() => setTagFilter(f => f === tg ? null : tg)}
                    className={`text-xs px-2 py-0.5 rounded-full border ${tagFilter === tg ? t.tagPillActive : t.tagPill}`}>#{tg}</button>
                ))}
              </div>
            )}
            {!isAdmin && (
              <div className={`mb-4 text-xs rounded-lg px-3 py-2 border ${t.warn}`}>Seuls les admins peuvent créer une squad. Activez la vue admin pour tester.</div>
            )}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {visibleSquads.map(s => {
                const isMember = s.coreTeam.includes(CURRENT_USER) || s.participants.includes(CURRENT_USER);
                return (
                  <div key={s.id} className={`border rounded-xl p-4 ${t.panel}`}>
                    <div className="flex items-center gap-3 mb-2">
                      <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-xs font-semibold ${darkMode ? TYPE.squad.chipDark : TYPE.squad.chip}`}>{s.logo}</div>
                      <div>
                        <div className="font-medium">{s.name}</div>
                        <div className={`text-xs ${t.faint}`}>{s.planning}</div>
                      </div>
                    </div>
                    <div className={`text-sm ${t.subtext}`}>{s.description}</div>
                    <a href={s.pageLink} className="text-xs text-violet-500">Page dédiée <Chevron /></a>
                    {(s.tags || []).length > 0 && (
                      <div className="flex flex-wrap gap-1 mt-2">
                        {s.tags.map(tg => <span key={tg} className={`text-xs px-2 py-0.5 rounded-full border ${t.tagPill}`}>#{tg}</span>)}
                      </div>
                    )}
                    <div className="grid grid-cols-2 gap-3 mt-3 text-xs">
                      <div><div className={`mb-1 ${t.faint}`}>Core team ({s.coreTeam.length})</div><div className={t.subtext}>{s.coreTeam.join(", ") || "—"}</div></div>
                      <div><div className={`mb-1 ${t.faint}`}>Participants ({s.participants.length})</div><div className={t.subtext}>{s.participants.join(", ") || "—"}</div></div>
                    </div>
                    <div className="flex flex-wrap gap-2 mt-3">
                      <button disabled={isMember} onClick={() => joinSquad(s.id, "participant")}
                        className={`text-xs font-medium px-3 py-1.5 rounded-lg border ${isMember ? `${t.chipNeutral} border-transparent` : `text-white border-transparent ${TYPE.squad.btn}`}`}>
                        Rejoindre comme participant
                      </button>
                      <button disabled={isMember} onClick={() => joinSquad(s.id, "core")}
                        className={`text-xs font-medium px-3 py-1.5 rounded-lg border ${isMember ? `${t.chipNeutral} border-transparent` : `border-violet-700 text-violet-700`}`}>
                        Rejoindre en core team
                      </button>
                    </div>
                    {isMember && (
                      <div className={`mt-2 text-xs ${t.faint}`}>
                        Vous êtes déjà membre ({s.coreTeam.includes(CURRENT_USER) ? "core team" : "participant"}).
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ---------- Synthèse admin ---------- */}
        {tab === "synthese" && isAdmin && !selectedPerson && (
          <div className="mt-5">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
              <div className={`text-sm ${t.subtext}`}>Total LM + Talk + Squad par personne (règle : max 2 / mois)</div>
              <div className="flex flex-wrap items-center gap-2">
                <select value={monthFilter} onChange={e => setMonthFilter(e.target.value)} className={`text-sm border rounded-lg px-2 py-1.5 ${t.input}`}>
                  <option value="tous">Tous les mois</option>
                  {synthesis.months.map(m => <option key={m} value={m}>{m}</option>)}
                </select>
                <button onClick={() => setShowReal(s => !s)} className={`text-sm px-3 py-1.5 rounded-lg border ${t.border}`}>
                  {showReal ? "Plafonner l'affichage à 2" : "Afficher les valeurs réelles"}
                </button>
                <button onClick={exportCSV} className={`text-sm px-3 py-1.5 rounded-lg border ${t.border}`}>Export CSV</button>
                <button onClick={exportJSON} className={`text-sm px-3 py-1.5 rounded-lg border ${t.border}`}>Export data.json</button>
                <button onClick={pushToGithub} className={`text-sm text-white px-3 py-1.5 rounded-lg ${TYPE.squad.btn}`}>Publier sur GitHub</button>
              </div>
            </div>
            <div className={`mb-4 text-xs ${t.faint}`}>
              {showReal ? "Affichage des totaux réels." : "Affichage plafonné à 2 par défaut (la valeur réelle apparaît au survol si elle dépasse 2)."}
            </div>
            {ghStatus && (
              <div className={`mb-4 text-xs rounded-lg px-3 py-2 border ${ghStatus.type === "error" ? t.warn : ghStatus.type === "success" ? "text-emerald-700 bg-emerald-50 border-emerald-200" : t.chipNeutral}`}>
                {ghStatus.msg}
              </div>
            )}
            <div className={`overflow-x-auto border rounded-xl ${t.border}`}>
              <table className="w-full text-sm">
                <thead>
                  <tr className={`text-left text-xs ${t.tableHead}`}>
                    <th className="px-3 py-2 font-medium">Personne</th>
                    {monthsToShow.map(m => <th key={m} className="px-3 py-2 font-medium capitalize font-mono">{m}</th>)}
                    <th className="px-3 py-2"></th>
                  </tr>
                </thead>
                <tbody>
                  {people.map(p => (
                    <tr key={p} className={`border-t ${t.rowBorder}`}>
                      <td className="px-3 py-2">{p}</td>
                      {monthsToShow.map(m => {
                        const val = synthesis.rows[p]?.[m] || 0;
                        const over = val > 2;
                        const displayVal = showReal ? val : Math.min(val, 2);
                        return (
                          <td key={m} title={over ? `Valeur réelle : ${val}` : undefined} className={`px-3 py-2 font-mono ${over ? `${t.over} font-medium` : t.subtext}`}>
                            {val === 0 ? "—" : displayVal}{over && !showReal ? "+" : ""}
                          </td>
                        );
                      })}
                      <td className="px-3 py-2 text-right">
                        <button onClick={() => setSelectedPerson(p)} className="text-xs text-violet-500">Détail <Chevron /></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className={`mt-3 text-xs ${t.faint}`}>
              Note : cette maquette persiste ses modifications uniquement dans votre navigateur (localStorage). Utilisez "Export data.json" pour récupérer un fichier à recommitter dans le dépôt si vous voulez que ces changements deviennent la nouvelle référence partagée.
            </div>
          </div>
        )}

        {/* ---------- Détail personne ---------- */}
        {tab === "synthese" && isAdmin && selectedPerson && (
          <div className="mt-5">
            <button onClick={() => setSelectedPerson(null)} className={`text-sm mb-4 ${t.subtext}`}>← Retour à la synthèse</button>
            <div className="text-lg font-medium mb-1">{selectedPerson}</div>
            <div className={`text-sm mb-4 ${t.faint}`}>{detail.myEvents.length} LM/Talk suivi(s) · {detail.mySquads.length} squad(s)</div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <div className={`text-xs font-medium mb-2 ${t.faint}`}>Learning Moments & Talks</div>
                <div className="flex flex-col gap-4">
                  {detail.eventsByMonth.map(([mk, evts]) => (
                    <div key={mk}>
                      <div className="text-xs font-semibold capitalize mb-2">{mk} <span className={`font-normal ${t.faint}`}>({evts.length})</span></div>
                      <div className="flex flex-col gap-2">
                        {evts.map(e => (
                          <div key={e.id} className={`border rounded-lg p-3 text-sm ${t.panel}`}>
                            <div className="flex items-center gap-2 mb-1 flex-wrap">
                              <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${darkMode ? TYPE[e.type].chipDark : TYPE[e.type].chip}`}>{TYPE[e.type].short}</span>
                              <span className={`text-xs ${t.faint}`}>{formatDate(e.date)} · {e.startTime}</span>
                              {e.status === "ferme" && <span className={`text-xs px-2 py-0.5 rounded-full ${t.chipNeutral}`}>Historique</span>}
                            </div>
                            <div>{e.title}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                  {detail.myEvents.length === 0 && <div className={`text-sm ${t.faint}`}>Aucune inscription.</div>}
                </div>
              </div>
              <div>
                <div className={`text-xs font-medium mb-2 ${t.faint}`}>Squads</div>
                <div className="flex flex-col gap-2">
                  {detail.mySquads.map(s => (
                    <div key={s.id} className={`border rounded-lg p-3 text-sm ${t.panel}`}>
                      <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${darkMode ? TYPE.squad.chipDark : TYPE.squad.chip}`}>{s.role}</span>
                      <div className="mt-1">{s.name}</div>
                    </div>
                  ))}
                  {detail.mySquads.length === 0 && <div className={`text-sm ${t.faint}`}>Aucune squad.</div>}
                </div>
              </div>
            </div>
          </div>
        )}

        {isAdmin && (
          <div className="mt-8 pt-4 border-t border-dashed border-slate-300/40 flex justify-end">
            <button onClick={resetFromSeed} className={`text-xs px-3 py-1.5 rounded-lg border ${t.border} ${t.faint}`}>
              Réinitialiser depuis data.json
            </button>
          </div>
        )}
      </div>

      {/* ---------- Modale LM / Talk ---------- */}
      {(modal === "lm" || modal === "talk") && (
        <div style={{ minHeight: 400 }} className={`fixed inset-0 flex items-center justify-center z-10 ${t.modalOverlay}`}>
          <form onSubmit={submitEvent} className={`rounded-xl p-5 w-full max-w-md border ${t.panel}`}>
            <div className="flex items-center justify-between mb-3">
              <div className="font-medium">Créer {modal === "lm" ? "un Learning Moment" : "un ECC Talk"}</div>
              <button type="button" onClick={() => setModal(null)}>✕</button>
            </div>
            <div className="flex flex-col gap-3 text-sm">
              <input required placeholder="Titre / sujet" value={form.title} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <textarea placeholder="Description" value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} rows={3} />
              <div className="flex gap-3">
                <input required type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} className={`border rounded-lg px-3 py-2 flex-1 ${t.input}`} />
                <input required type="time" value={form.startTime} onChange={e => setForm(f => ({ ...f, startTime: e.target.value }))} className={`border rounded-lg px-3 py-2 w-28 ${t.input}`} />
                <input type="number" min={15} step={15} value={form.duration} onChange={e => setForm(f => ({ ...f, duration: e.target.value }))} className={`border rounded-lg px-3 py-2 w-24 ${t.input}`} />
              </div>
              <input placeholder="Organisateur(s), séparés par des virgules" value={form.organizers} onChange={e => setForm(f => ({ ...f, organizers: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <input placeholder="Tags, séparés par des virgules (ex: UX, Cloud)" value={form.tags} onChange={e => setForm(f => ({ ...f, tags: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <div className={`text-xs ${t.faint}`}>Un lien visio disponible sera assigné automatiquement parmi les {visioLinks.length} liens permanents.</div>
            </div>
            <button type="submit" className={`mt-4 w-full text-white rounded-lg py-2 text-sm ${TYPE[modal].btn}`}>Créer</button>
          </form>
        </div>
      )}

      {/* ---------- Modale Configuration GitHub ---------- */}
      {modal === "config" && (
        <div style={{ minHeight: 400 }} className={`fixed inset-0 flex items-center justify-center z-10 ${t.modalOverlay}`}>
          <form onSubmit={saveGithubConfig} className={`rounded-xl p-5 w-full max-w-md border ${t.panel}`}>
            <div className="flex items-center justify-between mb-3">
              <div className="font-medium">Configuration GitHub</div>
              <button type="button" onClick={() => setModal(null)}>✕</button>
            </div>
            <div className="flex flex-col gap-3 text-sm">
              <div className="flex gap-3">
                <input required placeholder="Propriétaire (user/org)" value={configForm.owner} onChange={e => setConfigForm(f => ({ ...f, owner: e.target.value }))} className={`border rounded-lg px-3 py-2 flex-1 ${t.input}`} />
                <input required placeholder="Dépôt" value={configForm.repo} onChange={e => setConfigForm(f => ({ ...f, repo: e.target.value }))} className={`border rounded-lg px-3 py-2 flex-1 ${t.input}`} />
              </div>
              <div className="flex gap-3">
                <input placeholder="Branche (main)" value={configForm.branch} onChange={e => setConfigForm(f => ({ ...f, branch: e.target.value }))} className={`border rounded-lg px-3 py-2 flex-1 ${t.input}`} />
                <input placeholder="Chemin (data.json)" value={configForm.path} onChange={e => setConfigForm(f => ({ ...f, path: e.target.value }))} className={`border rounded-lg px-3 py-2 flex-1 ${t.input}`} />
              </div>
              <input required type="password" placeholder="Token GitHub (fine-grained, permission Contents: Read and write)" value={configForm.token} onChange={e => setConfigForm(f => ({ ...f, token: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <div className={`text-xs rounded-lg px-3 py-2 border ${t.warn}`}>
                Ce token est stocké uniquement dans le localStorage de <strong>ce navigateur</strong> et n'est envoyé qu'à api.github.com pour publier les données. Créez un token fine-grained limité à ce seul dépôt, avec uniquement la permission "Contents: Read and write" — ne réutilisez jamais un token à portée large ici, et ne l'entrez pas sur un poste partagé.
              </div>

              {shareLink && (
                <div className={`border rounded-lg p-3 ${t.panel} ${t.border}`}>
                  <div className="text-xs font-medium mb-1">Lien de partage (config + token inclus)</div>
                  <input readOnly value={shareLink} onFocus={e => e.target.select()} className={`border rounded-lg px-3 py-2 text-xs w-full mb-2 ${t.input}`} />
                  <button type="button" onClick={copyShareLink} className={`text-xs px-3 py-1.5 rounded-lg border ${t.border}`}>Copier le lien</button>
                  <div className={`text-xs rounded-lg px-3 py-2 border mt-2 ${t.warn}`}>
                    Ce lien contient votre token en clair : quiconque l'ouvre obtient un accès en écriture au dépôt configuré. Traitez-le comme un mot de passe — ne l'envoyez jamais par un canal non chiffré ou public (pas de post public, pas de ticket visible par tous). Le token n'est pas envoyé au serveur (il reste dans le fragment #, après le "#", qui n'est jamais transmis en HTTP) mais il reste visible dans l'historique de navigation et dans tout outil de partage de lien (chat, email) — à révoquer côté GitHub si le lien a pu fuiter.
                  </div>
                </div>
              )}
            </div>
            <button type="submit" className={`mt-4 w-full text-white rounded-lg py-2 text-sm ${TYPE.squad.btn}`}>Enregistrer</button>
          </form>
        </div>
      )}

      {/* ---------- Modale Squad ---------- */}
      {modal === "squad" && (
        <div style={{ minHeight: 400 }} className={`fixed inset-0 flex items-center justify-center z-10 ${t.modalOverlay}`}>
          <form onSubmit={submitSquad} className={`rounded-xl p-5 w-full max-w-md border ${t.panel}`}>
            <div className="flex items-center justify-between mb-3">
              <div className="font-medium">Créer une squad</div>
              <button type="button" onClick={() => setModal(null)}>✕</button>
            </div>
            <div className="flex flex-col gap-3 text-sm">
              <input required placeholder="Nom de la squad" value={squadForm.name} onChange={e => setSquadForm(f => ({ ...f, name: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <textarea placeholder="Description" value={squadForm.description} onChange={e => setSquadForm(f => ({ ...f, description: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} rows={3} />
              <input placeholder="Logo (initiales, ex: DATA)" value={squadForm.logo} onChange={e => setSquadForm(f => ({ ...f, logo: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <input placeholder="Lien de la page dédiée" value={squadForm.pageLink} onChange={e => setSquadForm(f => ({ ...f, pageLink: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <input placeholder="Planning (ex: 1 réunion / mois, 1h)" value={squadForm.planning} onChange={e => setSquadForm(f => ({ ...f, planning: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <input placeholder="Tags, séparés par des virgules" value={squadForm.tags} onChange={e => setSquadForm(f => ({ ...f, tags: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <input placeholder="Core team, séparés par des virgules" value={squadForm.coreTeam} onChange={e => setSquadForm(f => ({ ...f, coreTeam: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
              <input placeholder="Participants, séparés par des virgules" value={squadForm.participants} onChange={e => setSquadForm(f => ({ ...f, participants: e.target.value }))} className={`border rounded-lg px-3 py-2 ${t.input}`} />
            </div>
            <button type="submit" className={`mt-4 w-full text-white rounded-lg py-2 text-sm ${TYPE.squad.btn}`}>Créer</button>
          </form>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
